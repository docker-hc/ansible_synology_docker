[defaults]
inventory = inventory
private_key_file = ~/.ssh/ansible
roles_path = roles
retry_files_enabled = False
stdout_callback = yaml
timeout = 30
forks = 10
gathering = smart
[ssh_connection]
ssh_args = -o Port=2299
transfer_method = piped
scp_if_ssh = False
pipelining = True
# Force Ansible to use Entware Python for all tasks
interpreter_python = /opt/bin/python3

