- name: Ensure Nextcloud data directory exists
  file:
    path: "{{ docker_data_path }}/nextcloud"
    state: directory
    owner: 33          # www-data inside container
    group: 33
    mode: "0755"

- name: Deploy Nextcloud container
  community.docker.docker_container:
    name: "{{ nextcloud.container_name | default('nextcloud') }}"
    image: "{{ nextcloud.image | default('nextcloud:27') }}"
    state: started
    restart_policy: unless-stopped
    security_opts:
      - seccomp:unconfined
    capabilities:
      - SYS_ADMIN
      - NET_ADMIN
    mounts:
      - type: bind
        source: /dev/urandom
        target: /dev/urandom
    networks:
      - name: "{{ docker_network_name }}"
    env:
      MYSQL_PASSWORD: "{{ nextcloud.db_password }}"
      MYSQL_DATABASE: "{{ nextcloud.database | default('nextcloud') }}"
      MYSQL_USER: "{{ nextcloud.db_user | default('nextcloud') }}"
      MYSQL_HOST: "{{ mariadb.container_name }}"
      REDIS_HOST: "{{ redis.container_name }}"
    volumes:
      - "{{ docker_data_path }}/nextcloud:/var/www/html"
    ports:
      - "6001:80"   # reverse proxy mapping
    memory: "{{ nextcloud.memory | default('1024m') }}"

