---
- name: Ensure Nextcloud directories exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ nextcloud.puid }}"
    group: "{{ nextcloud.pgid }}"
    mode: "{{item.mode}}"
  loop:
    - { path: "{{ docker_data_path }}/nextcloud/config", mode: "0755" }
    - { path: "{{ docker_data_path }}/nextcloud/data", mode: "0770" }
    

- name: Deploy Nextcloud container
  community.docker.docker_container:
    name: "{{ nextcloud.container_name | default('nextcloud') }}"
    image: "{{ nextcloud.image | default('lscr.io/linuxserver/nextcloud:latest') }}"
    state: started
    restart_policy: unless-stopped
    pull: false
    security_opts:
      - seccomp:unconfined
    capabilities:
      - SYS_ADMIN
      - NET_ADMIN
    devices:
      - "/dev/urandom:/dev/urandom"
    networks:
      - name: "{{ docker_network_name }}"
    env:
      PUID: "{{ nextcloud.puid }}"
      PGID: "{{ nextcloud.pgid }}"
      TZ: "{{ nextcloud.timezone }}"
      MYSQL_PASSWORD: "{{ nextcloud.db_password }}"
      MYSQL_DATABASE: "{{ nextcloud.database | default('nextcloud') }}"
      MYSQL_USER: "{{ nextcloud.db_user | default('nextcloud') }}"
      MYSQL_HOST: "{{ mariadb.container_name }}"
      REDIS_HOST: "{{ redis.container_name }}"
    volumes:
      - "{{ docker_data_path }}/nextcloud/config:/config"
      - "{{ docker_data_path }}/nextcloud/data:/data"
    ports:
      - "{{ nextcloud.port | default('6001') }}:80"
    memory: "{{ nextcloud.memory | default('1024m') }}"
    memory_swap: "{{ nextcloud.memory_swap | default('2g') }}"
    comparisons:
      volumes: strict
      env: strict
      networks: strict

- name: Fix Nextcloud config symlink for new image structure
  command: >
    /usr/local/bin/docker exec nextcloud bash -c
    'if [ ! -L /app/www/src/config/config.php ]; then
      rm -f /app/www/src/config/config.php &&
      ln -s /config/www/nextcloud/config/config.php /app/www/src/config/config.php;
    fi'
  changed_when: false

- name: Fix Nextcloud config directory ownership
  command: /usr/local/bin/docker exec nextcloud chown -R abc:abc /config/www/nextcloud/config
  changed_when: false

- name: Set Nextcloud trusted domains
  shell: >
    /usr/local/bin/docker exec nextcloud sudo -u abc php /app/www/src/occ
    config:system:set trusted_domains {{ item.index }}
    --value='{{ item.domain }}'
  loop:
    - { index: 0, domain: "192.168.2.102:6001" }
    - { index: 1, domain: "*.dk-cyberworld.synology.me" }
  changed_when: false
