---
- name: Ensure Redis data directory exists
  ansible.builtin.file:
    path: "{{ docker_data_path }}/redis"
    state: directory
    owner: "{{ redis.puid | default('999') }}"
    group: "{{ redis.pgid | default('999') }}"
    mode: "0755"

- name: Deploy Redis container
  community.docker.docker_container:
    name: "{{ redis.container_name }}"
    image: "{{ redis.image | default('redis:7') }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network_name }}"
    volumes:
      - "{{ docker_data_path }}/redis:/data"
    command: redis-server --appendonly yes
    ports: []
    memory: "{{ redis.memory | default('256m') }}"
    memory_swap: "{{ redis.memory_swap | default('512m') }}"
    comparisons:
      volumes: strict
      env: strict
      networks: strict
