---
- name: Ensure Redis data directory exists
  file:
    path: "{{ docker_data_path }}/redis"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Redis container
  community.docker.docker_container:
    name: "{{ redis.container_name }}"
    image: "{{ redis.image | default('redis:7') }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network_name }}"
    volumes:
      - "{{ docker_data_path }}/redis:/data"
    command: redis-server --appendonly yes
    ports: []
    memory: "{{ redis.memory | default('256m') }}"

