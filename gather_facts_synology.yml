---
- name: Gather facts and identify Entware
  hosts: all
  become: true
  tasks:
    - name: Gather facts
      ansible.builtin.gather_facts:

    - name: Show the gathered facts
      debug:
        var: ansible_facts

    - name: Check for Entware
      debug:
        msg: "entware is: {{ ansible_facts['opkg'] }}"

